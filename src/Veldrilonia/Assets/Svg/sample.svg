<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="50%" stop-color="#ffd93d" />
      <stop offset="100%" stop-color="#6bcb77" />
    </linearGradient>
    <radialGradient id="grad2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4ecdc4" />
      <stop offset="100%" stop-color="#2c3e50" />
    </radialGradient>
  </defs>

  <!-- Rectangle avec degrade lineaire -->
  <rect x="20" y="20" width="160" height="160" fill="url(#grad1)" />

  <!-- Cercle avec degrade radial -->
  <circle cx="300" cy="100" r="80" fill="url(#grad2)" />

  <!-- Etoile avec couleur unie -->
  <polygon points="200,220 230,310 320,310 245,360 270,450 200,390 130,450 155,360 80,310 170,310"
           fill="#e74c3c" stroke="#c0392b" stroke-width="3" />

  <!-- Ellipse -->
  <ellipse cx="100" cy="350" rx="70" ry="40" fill="#3498db" stroke="#2980b9" stroke-width="2" />
</svg>
